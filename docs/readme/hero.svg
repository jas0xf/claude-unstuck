<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" width="900" height="460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="claude-unstuck — Claude Code keeps freezing? It's not Claude, it's IPv6. Diagnose in 30 seconds, fix in one command.">
  <defs>
    <linearGradient id="wm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fb950"/><stop offset="1" stop-color="#2ea043"/>
    </linearGradient>
    <radialGradient id="glowbg" cx="0.18" cy="0.0" r="0.9">
      <stop offset="0" stop-color="#2b3340" stop-opacity="0.06"/><stop offset="0.55" stop-color="#2b3340" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fb950" stop-opacity="0"/><stop offset="1" stop-color="#3fb950" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- card -->
  <rect x="1" y="1" width="898" height="458" rx="16" fill="#0d1117" stroke="#1c2128"/>
  <rect x="1" y="1" width="898" height="458" rx="16" fill="url(#glowbg)"/>

  <!-- wordmark -->
  <text x="56" y="120" font-size="62" font-weight="800" letter-spacing="-2.5">
    <tspan fill="#e6edf3">claude</tspan><tspan fill="url(#wm)">-unstuck</tspan>
  </text>

  <!-- taglines -->
  <text x="58" y="162" font-size="18" fill="#9aa4b2">Claude Code keeps freezing? <tspan fill="#e6edf3" font-weight="600">It's not Claude — it's IPv6.</tspan></text>
  <text x="58" y="190" font-size="18" fill="#9aa4b2">Diagnose in <tspan fill="#58a6ff" font-weight="600">30 seconds</tspan>. Fix in <tspan fill="#58a6ff" font-weight="600">one command</tspan>.</text>

  <!-- diagnostic: two lanes -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <!-- IPv6 lane (stalls) -->
    <text x="58" y="270" font-size="14" fill="#d29922" font-weight="700">IPv6</text>
    <line x1="150" y1="265" x2="700" y2="265" stroke="#1c2128" stroke-width="2"/>
    <line x1="150" y1="265" x2="378" y2="265" stroke="#d29922" stroke-width="2" opacity="0.55"/>
    <line x1="378" y1="265" x2="700" y2="265" stroke="#d29922" stroke-width="2" stroke-dasharray="2 7" opacity="0.28"/>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;228,0;228,0" keyTimes="0;0.36;1" dur="3s" repeatCount="indefinite"/>
      <circle cx="150" cy="265" r="11" fill="#d29922" opacity="0">
        <animate attributeName="r" values="6;16;6" dur="1.4s" begin="1.1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.5;0" dur="1.4s" begin="1.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="150" cy="265" r="5.5" fill="#d29922" filter="url(#soft)"/>
    </g>
    <text x="716" y="270" font-size="14" fill="#d29922" font-weight="700">✕ stalled</text>
    <text x="716" y="289" font-size="12" fill="#6e7681">180s · 0 bytes</text>

    <!-- IPv4 lane (flows) -->
    <text x="58" y="350" font-size="14" fill="#3fb950" font-weight="700">IPv4</text>
    <line x1="150" y1="345" x2="700" y2="345" stroke="#1c2128" stroke-width="2"/>
    <line x1="150" y1="345" x2="700" y2="345" stroke="#3fb950" stroke-width="2" opacity="0.30"/>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.9;1" dur="1.9s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;550,0" dur="1.9s" repeatCount="indefinite"/>
      <rect x="104" y="342.5" width="46" height="5" rx="2.5" fill="url(#trail)"/>
      <circle cx="150" cy="345" r="5.5" fill="#56d364" filter="url(#soft)"/>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.9;1" dur="1.9s" begin="0.63s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;550,0" dur="1.9s" begin="0.63s" repeatCount="indefinite"/>
      <rect x="104" y="342.5" width="46" height="5" rx="2.5" fill="url(#trail)"/>
      <circle cx="150" cy="345" r="5.5" fill="#56d364" filter="url(#soft)"/>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.9;1" dur="1.9s" begin="1.26s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;550,0" dur="1.9s" begin="1.26s" repeatCount="indefinite"/>
      <rect x="104" y="342.5" width="46" height="5" rx="2.5" fill="url(#trail)"/>
      <circle cx="150" cy="345" r="5.5" fill="#56d364" filter="url(#soft)"/>
    </g>
    <text x="716" y="350" font-size="14" fill="#3fb950" font-weight="700">✓ streaming</text>
    <text x="716" y="369" font-size="12" fill="#6e7681">same speed</text>
  </g>

  <!-- verdict -->
  <text x="58" y="410" font-size="15" fill="#9aa4b2">IPv6 hangs, IPv4 doesn't — <tspan fill="#e6edf3" font-weight="600">this is the bug, and it's fixable.</tspan></text>
  <!-- meta -->
  <text x="58" y="440" font-size="12.5" fill="#6e7681" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">macOS&#160;·&#160;Linux&#160;·&#160;Windows&#160;&#160;·&#160;&#160;zero deps&#160;&#160;·&#160;&#160;no root&#160;&#160;·&#160;&#160;MIT</text>
</svg>
