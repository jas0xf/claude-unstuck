<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Claude Code session hang rate on the same machine, hour and account: IPv6 hung 74 percent (89 of 120 sessions), IPv4 hung 5 percent (6 of 120). Only the address family differs.">
  <defs>
    <linearGradient id="barv6" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#9e7615"/><stop offset="1" stop-color="#d29922"/></linearGradient>
    <linearGradient id="barv4" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#238636"/><stop offset="1" stop-color="#3fb950"/></linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fff" stop-opacity="0"/><stop offset="0.5" stop-color="#fff" stop-opacity="0.10"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient>
    <clipPath id="clipv6"><rect x="120" y="138" width="525" height="34" rx="8"/></clipPath>
    <clipPath id="clipv4"><rect x="120" y="214" width="35" height="34" rx="8"/></clipPath>
  </defs>

  <rect x="1" y="1" width="898" height="298" rx="16" fill="#0d1117" stroke="#1c2128"/>

  <text x="56" y="46" font-size="12" letter-spacing="3" font-family="ui-monospace, Menlo, monospace" fill="#6e7681">SAME MACHINE · SAME HOUR · SAME ACCOUNT</text>
  <text x="56" y="80" font-size="27" font-weight="800" letter-spacing="-0.6" fill="#e6edf3">Only the address family changed.</text>

  <!-- track backdrops -->
  <rect x="120" y="138" width="710" height="34" rx="8" fill="#11161d"/>
  <rect x="120" y="214" width="710" height="34" rx="8" fill="#11161d"/>

  <!-- IPv6 bar 74% -->
  <g clip-path="url(#clipv6)">
    <rect x="120" y="138" width="525" height="34" fill="url(#barv6)"/>
    <rect x="-90" y="138" width="90" height="34" fill="url(#shine)">
      <animateTransform attributeName="transform" type="translate" values="120,0;735,0" dur="2.8s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="56" y="160" font-size="15" font-weight="700" fill="#d29922" font-family="ui-monospace,Menlo,monospace">IPv6</text>
  <text x="662" y="165" font-size="28" font-weight="800" fill="#d29922">74%</text>
  <text x="662" y="186" font-size="12.5" fill="#6e7681" font-family="ui-monospace,Menlo,monospace">89 / 120 sessions hung</text>

  <!-- IPv4 bar 5% (no shine — too narrow to show one) -->
  <rect x="120" y="214" width="35" height="34" rx="8" fill="url(#barv4)"/>
  <text x="56" y="236" font-size="15" font-weight="700" fill="#3fb950" font-family="ui-monospace,Menlo,monospace">IPv4</text>
  <text x="172" y="241" font-size="28" font-weight="800" fill="#3fb950">5%</text>
  <text x="244" y="241" font-size="12.5" fill="#6e7681" font-family="ui-monospace,Menlo,monospace">6 / 120</text>

  <text x="56" y="284" font-size="13.5" fill="#8b949e">120 paired monitor cycles · Spectrum residential line · same machine, same hours — <tspan fill="#e6edf3" font-weight="600">only the address family differs.</tspan></text>
</svg>
