<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="900" height="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="On the wire: a healthy session streams content deltas to message_stop; a hung IPv6 session sends HTTP 200 and message_start, then silence until the client gives up at 180s with 0 bytes back; sometimes the server sends a TCP RST or FIN instead, always after the upload is fully received.">
  <defs>
    <filter id="wglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="1" y="1" width="898" height="358" rx="16" fill="#ffffff" stroke="#d1d9e0"/>

  <!-- header -->
  <text x="56" y="44" font-size="12" letter-spacing="3" font-family="ui-monospace, Menlo, monospace" fill="#818b98">ON THE WIRE · DECRYPTED SSE</text>
  <text x="56" y="76" font-size="26" font-weight="800" letter-spacing="-0.5" fill="#1f2328">What a freeze actually looks like.</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <!-- HEALTHY -->
    <text x="56" y="140" font-size="14" font-weight="700" fill="#3fb950">healthy</text>
    <line x1="150" y1="160" x2="800" y2="160" stroke="#d1d9e0" stroke-width="2"/>
    <line x1="150" y1="160" x2="800" y2="160" stroke="#3fb950" stroke-width="2" opacity="0.28"/>
    <circle cx="150" cy="160" r="6" fill="#3fb950" filter="url(#wglow)"/>
    <circle cx="285" cy="160" r="6" fill="#3fb950" filter="url(#wglow)"/>
    <!-- streaming deltas -->
    <g fill="#56d364">
      <rect x="380" y="155" width="9" height="10" rx="2" opacity="0"><animate attributeName="opacity" values="0;1;1;0.2" keyTimes="0;0.1;0.85;1" dur="2.2s" repeatCount="indefinite"/></rect>
      <rect x="405" y="155" width="9" height="10" rx="2" opacity="0"><animate attributeName="opacity" values="0;1;1;0.2" keyTimes="0;0.1;0.85;1" dur="2.2s" begin="0.16s" repeatCount="indefinite"/></rect>
      <rect x="430" y="155" width="9" height="10" rx="2" opacity="0"><animate attributeName="opacity" values="0;1;1;0.2" keyTimes="0;0.1;0.85;1" dur="2.2s" begin="0.32s" repeatCount="indefinite"/></rect>
      <rect x="455" y="155" width="9" height="10" rx="2" opacity="0"><animate attributeName="opacity" values="0;1;1;0.2" keyTimes="0;0.1;0.85;1" dur="2.2s" begin="0.48s" repeatCount="indefinite"/></rect>
      <rect x="480" y="155" width="9" height="10" rx="2" opacity="0"><animate attributeName="opacity" values="0;1;1;0.2" keyTimes="0;0.1;0.85;1" dur="2.2s" begin="0.64s" repeatCount="indefinite"/></rect>
      <rect x="505" y="155" width="9" height="10" rx="2" opacity="0"><animate attributeName="opacity" values="0;1;1;0.2" keyTimes="0;0.1;0.85;1" dur="2.2s" begin="0.80s" repeatCount="indefinite"/></rect>
      <rect x="530" y="155" width="9" height="10" rx="2" opacity="0"><animate attributeName="opacity" values="0;1;1;0.2" keyTimes="0;0.1;0.85;1" dur="2.2s" begin="0.96s" repeatCount="indefinite"/></rect>
    </g>
    <circle cx="710" cy="160" r="6" fill="#3fb950" filter="url(#wglow)"/>
    <text x="150" y="184" font-size="11" fill="#818b98" text-anchor="middle">request</text>
    <text x="285" y="184" font-size="11" fill="#818b98" text-anchor="middle">200 · message_start</text>
    <text x="455" y="142" font-size="11" fill="#818b98">content deltas streaming</text>
    <text x="710" y="184" font-size="11" fill="#3fb950" text-anchor="middle">message_stop ✓</text>

    <!-- HUNG -->
    <text x="56" y="248" font-size="14" font-weight="700" fill="#d29922">hung · IPv6</text>
    <line x1="150" y1="268" x2="800" y2="268" stroke="#d1d9e0" stroke-width="2"/>
    <line x1="150" y1="268" x2="285" y2="268" stroke="#d29922" stroke-width="2" opacity="0.5"/>
    <line x1="285" y1="268" x2="788" y2="268" stroke="#d29922" stroke-width="2" stroke-dasharray="2 8" opacity="0.32"/>
    <circle cx="150" cy="268" r="6" fill="#d29922" filter="url(#wglow)"/>
    <circle cx="285" cy="268" r="6" fill="#d29922" filter="url(#wglow)"/>
    <!-- probe into the void -->
    <circle cy="268" r="4" fill="#d29922" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="2.6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="285,0;470,0" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <!-- client gives up -->
    <circle cx="788" cy="268" r="12" fill="#d29922" opacity="0"><animate attributeName="r" values="7;18;7" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="788" cy="268" r="6.5" fill="#d29922" filter="url(#wglow)"/>
    <text x="500" y="252" font-size="13" fill="#d29922" font-weight="700" text-anchor="middle">…  silence  …<animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/></text>
    <text x="150" y="292" font-size="11" fill="#818b98" text-anchor="middle">request</text>
    <text x="285" y="292" font-size="11" fill="#818b98" text-anchor="middle">200 · message_start</text>
    <text x="788" y="292" font-size="11" fill="#d29922" text-anchor="end">client gives up · 180s · 0 bytes</text>
  </g>

  <text x="56" y="338" font-size="13.5" fill="#59636e" font-family="-apple-system,'Segoe UI',sans-serif"><tspan fill="#1f2328" font-weight="600">The upload is fully ACKed</tspan> — then 0 bytes come back. The network delivered everything; the answer never does.</text>
</svg>
